    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Add New Contact</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body ">
                    <div class="text-center display-4 py-3">
                        <i class="fa-solid fa-circle-user fa-2xl" style="color: rgb(2, 103, 180);"></i>
                    </div>
                    <div class="text-center py-3">
                        <button onclick="getphoto()" id="demo" class="btn btn-secondary">Change Photo</button>
                        <input type="file" id="fileInput" style="display: none;">
                    </div>
                    <div class="py-2">
                        <label for="full-name" class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input oninput="IsContactNameVaild()" type="email" class="is-valid form-control" id="full-name"
                            placeholder="Enter full name">
                    </div>
                    <div class="py-2">
                        <label for="PhoneNumber" class="form-label">PhoneNumber<span class="text-danger">*</span></label>
                        <input oninput="IsContactPhoneNumberVaild()" type="tel" class="is-valid form-control" id="PhoneNumber" placeholder="e.g.01012345678">
                    </div>
                    <div class="py-2">
                        <label for="EmailAddress" class="form-label">EmailAddress</label>

                        <input type="text" class="form-control is-valid" id="EmailAddress"
                            placeholder="Name@example.com">
                    </div>
                    <div class="py-2">
                        <label for="Address" class="form-label">Address</label>

                        <input type="text" class="form-control is-valid" id="Address" placeholder="Enter address">
                    </div>
                    <div class="for py-2">
                        <label for="group">Group</label>
                        <select class="w-100 rounded-3 my-select-input py-3" id="group">
                            <option selected>select a group</option>
                            <option value="family">family</option>
                            <option value="freinds">freinds</option>
                            <option value="work">work</option>
                            <option value="school">school</option>
                            <option value="other">other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="Notes" class="form-label">Notes</label>
                        <textarea class="my-text-area form-control" id="Notes"
                            placeholder="Add notes about this contact" rows="3"></textarea>
                    </div>
                    <div class="d-flex flex-wrap">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                            <label class=" form-check-label" for="checkDefault">
                                <i class="fa-solid fa-star fa-xs" style="color: rgb(255, 212, 59);"></i> Favorite
                            </label>
                        </div>
                        <div class="form-check ms-5">
                            <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
                            <label class="form-check-label" for="checkChecked">
                                <i class="fa-solid fa-heart-pulse fa-sm" style="color: rgb(231, 18, 18);"></i> Emergency
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-around ">
                    <button type="button" class="btn btn-secondary cancel" data-bs-dismiss="modal">Cancel</button>
                    <button onclick="AddContact()" type="button" class="btn btn-primary save-btn">Save Contact</button>
                </div>
            </div>
        </div>
    </div>
